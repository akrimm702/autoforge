<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="680" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="190" width="680" height="4" fill="url(#accent)" rx="0"/>
  
  <!-- Hammer emoji area -->
  <text x="50" y="115" font-size="64" fill="none">🔨</text>
  <text x="50" y="115" font-size="64">🔨</text>
  
  <!-- Title -->
  <text x="130" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">AutoForge</text>
  
  <!-- Subtitle -->
  <text x="130" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Stop vibing. Start converging.</text>
  
  <!-- Tags -->
  <rect x="130" y="140" width="95" height="24" rx="12" fill="#e94560" opacity="0.2"/>
  <text x="177" y="157" font-family="system-ui, sans-serif" font-size="11" fill="#e94560" text-anchor="middle">4 Modes</text>
  
  <rect x="235" y="140" width="115" height="24" rx="12" fill="#f59e0b" opacity="0.2"/>
  <text x="292" y="157" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Multi-Model</text>
  
  <rect x="360" y="140" width="120" height="24" rx="12" fill="#10b981" opacity="0.2"/>
  <text x="420" y="157" font-family="system-ui, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">Convergence</text>
  
  <rect x="490" y="140" width="110" height="24" rx="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="545" y="157" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle">Live Reports</text>
  
  <!-- Progress bar decoration -->
  <rect x="470" y="70" width="170" height="12" rx="6" fill="#1e293b"/>
  <rect x="470" y="70" width="170" height="12" rx="6" fill="url(#accent)" opacity="0.8"/>
  <text x="555" y="80" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">100%</text>
  
  <rect x="470" y="88" width="170" height="12" rx="6" fill="#1e293b"/>
  <rect x="470" y="88" width="136" height="12" rx="6" fill="#10b981" opacity="0.6"/>
  <text x="538" y="98" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">80%</text>
  
  <rect x="470" y="106" width="170" height="12" rx="6" fill="#1e293b"/>
  <rect x="470" y="106" width="76" height="12" rx="6" fill="#f59e0b" opacity="0.5"/>
  <text x="508" y="116" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">45%</text>
</svg>
